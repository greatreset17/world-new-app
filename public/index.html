    <!-- ALL JS INLINED (no ES modules — works with file://) -->
    <script>
            (function () {
                'use strict';

                // ============================================================
                // STORAGE MODULE
                // ============================================================
                var STORAGE_KEY = 'worldnews_articles_v2';
                var MAX_ARTICLES = 100;

                function getStoredArticles() {
                    try {
                        var data = localStorage.getItem(STORAGE_KEY);
                        return data ? JSON.parse(data) : [];
                    } catch (e) { return []; }
                }

                function saveArticles(articles) {
                    try {
                        localStorage.setItem(STORAGE_KEY, JSON.stringify(articles.slice(0, MAX_ARTICLES)));
                    } catch (e) { console.error('[Storage]', e); }
                }

                function mergeArticles(newArticles) {
                    var existing = getStoredArticles();
                    var existingUrls = new Set(existing.map(function (a) { return a.link; }));
                    var unique = newArticles.filter(function (a) { return !existingUrls.has(a.link); });
                    var merged = unique.concat(existing).slice(0, MAX_ARTICLES);
                    saveArticles(merged);
                    return merged;
                }

                // ============================================================
                // TRANSLATOR MODULE (MyMemory API — EN→JP)
                // ============================================================
                var TRANSLATE_API = 'https://api.mymemory.translated.net/get';
                var translateCache = {};

                async function translateText(text, from, to) {
                    if (!text || text.trim().length === 0) return text;
                    var key = from + '|' + to + ':' + text.substring(0, 100);
                    if (translateCache[key]) return translateCache[key];

                    // Truncate very long text (API limit ~500 chars per request)
                    var truncated = text.length > 450 ? text.substring(0, 450) + '...' : text;

                    try {
                        var url = TRANSLATE_API + '?q=' + encodeURIComponent(truncated) + '&langpair=' + from + '|' + to;
                        var resp = await fetch(url, { signal: AbortSignal.timeout(10000) });
                        if (!resp.ok) throw new Error('Translation API error');
                        var data = await resp.json();
                        if (data.responseStatus === 200 && data.responseData && data.responseData.translatedText) {
                            var result = data.responseData.translatedText;
                            translateCache[key] = result;
                            return result;
                        }
                        throw new Error('Bad response');
                    } catch (e) {
                        console.warn('[Translate] Failed:', e.message);
                        return text; // Return original on failure
                    }
                }

                async function translateArticle(article) {
                    if (article.lang === 'ja') return article; // Japanese — no translation needed

                    try {
                        var translatedTitle = await translateText(article.title, 'en', 'ja');
                        var translatedDesc = await translateText(article.description, 'en', 'ja');
                        return Object.assign({}, article, {
                            titleOriginal: article.title,
                            title: translatedTitle,
                            descriptionOriginal: article.description,
                            description: translatedDesc,
                            translated: true
                        });
                    } catch (e) {
                        return article;
                    }
                }

                // ============================================================
                // SUMMARIZER MODULE
                // ============================================================
                var STOP_WORDS = new Set([
                    'the', 'a', 'an', 'is', 'are', 'was', 'were', 'be', 'been', 'being', 'have', 'has', 'had',
                    'do', 'does', 'did', 'will', 'would', 'could', 'should', 'may', 'might', 'can', 'shall',
                    'to', 'of', 'in', 'for', 'on', 'with', 'at', 'by', 'from', 'as', 'into', 'through',
                    'during', 'before', 'after', 'and', 'but', 'or', 'nor', 'not', 'so', 'yet', 'both',
                    'either', 'neither', 'each', 'every', 'all', 'any', 'few', 'more', 'most', 'other',
                    'some', 'such', 'no', 'only', 'own', 'same', 'than', 'too', 'very', 'just', 'because',
                    'if', 'when', 'where', 'how', 'what', 'which', 'who', 'whom', 'this', 'that', 'these',
                    'those', 'it', 'its', 'he', 'she', 'they', 'them', 'their', 'we', 'our', 'us', 'i', 'me',
                    'my', 'you', 'your', 'said', 'also', 'about', 'up', 'out', 'one', 'two', 'new',
                    'の', 'に', 'は', 'を', 'た', 'が', 'で', 'て', 'と', 'し', 'れ', 'さ', 'ある', 'いる',
                    'も', 'する', 'から', 'な', 'こと', 'として', 'い', 'や', 'れる', 'など', 'なっ', 'ない',
                    'この', 'ため', 'その', 'あっ', 'よう', 'また', 'もの', 'という', 'あり', 'まで', 'られ',
                    'なる', 'へ', 'か', 'だ', 'これ', 'により', 'おり', 'より', 'による', 'ず', 'なり',
                    'です', 'ます', 'した', 'ました', 'している', 'される', 'された', 'について', 'として',
                    'において', 'に対して', 'によると', 'に関して', 'それぞれ', 'ている', 'ことが',
                    'しています', 'されています', 'しました', 'されました', 'ことを', 'ようです'
                ]);

                function summarize(text, numSentences) {
                    numSentences = numSentences || 2;
                    if (!text || text.trim().length === 0) return '要約データなし';
                    if (text.length < 80) return text;

                    var sentences = text.split(/(?<=[。．！？.!?])\s*/).map(function (s) { return s.trim(); }).filter(function (s) { return s.length > 5; });
                    if (sentences.length <= numSentences) return sentences.join(' ');

                    var words = text.toLowerCase().replace(/[^\w\s\u3000-\u9FFF\uF900-\uFAFF]/g, ' ')
                        .split(/\s+/).filter(function (w) { return w.length > 1 && !STOP_WORDS.has(w); });
                    var freq = {};
                    words.forEach(function (w) { freq[w] = (freq[w] || 0) + 1; });
                    var maxF = Math.max.apply(null, Object.values(freq).concat([1]));
                    Object.keys(freq).forEach(function (w) { freq[w] /= maxF; });

                    var scored = sentences.map(function (s, i) {
                        var sw = s.toLowerCase().replace(/[^\w\s\u3000-\u9FFF\uF900-\uFAFF]/g, ' ')
                            .split(/\s+/).filter(function (w) { return w.length > 1; });
                        if (sw.length === 0) return { s: s, score: 0, i: i };
                        var sc = sw.reduce(function (sum, w) { return sum + (freq[w] || 0); }, 0);
                        var lf = (sw.length > 5 && sw.length < 30) ? 1.0 : 0.7;
                        return { s: s, score: (sc / sw.length) * lf, i: i };
                    });

                    return scored.sort(function (a, b) { return b.score - a.score; })
                        .slice(0, numSentences)
                        .sort(function (a, b) { return a.i - b.i; })
                        .map(function (t) { return t.s; }).join(' ');
                }

                function summarizeArticles(articles) {
                    return articles.map(function (a) {
                        return Object.assign({}, a, { summary: a.summary || summarize(a.description) });
                    });
                }

                // ============================================================
                // RSS FETCHER MODULE
                // ============================================================
                var CORS_PROXIES = [
                    'https://api.allorigins.win/raw?url=',
                    'https://corsproxy.io/?url=',
                    'https://api.codetabs.com/v1/proxy?quest=',
                ];

                var NEWS_SOURCES = [
                    { name: 'BBC News', url: 'https://feeds.bbci.co.uk/news/world/rss.xml', category: '国際', lang: 'en', icon: '🌍' },
                    { name: 'Reuters', url: 'https://feeds.reuters.com/reuters/topNews', category: '国際', lang: 'en', icon: '�' },
                    { name: 'TechCrunch', url: 'https://techcrunch.com/feed/', category: 'テクノロジー', lang: 'en', icon: '�' },
                    { name: 'NHKニュース', url: 'https://www3.nhk.or.jp/rss/news/cat0.xml', category: '国内', lang: 'ja', icon: '🇯🇵' },
                    { name: 'Yahoo!ニュース', url: 'https://news.yahoo.co.jp/rss/topics/top-picks.xml', category: '国内', lang: 'ja', icon: '📱' },
                    { name: 'Hacker News', url: 'https://hnrss.org/frontpage', category: 'テクノロジー', lang: 'en', icon: '🔶' }
                ];

                // Category labels for UI (Japanese)
                var CATEGORY_LABELS = {
                    'All': '� すべて',
                    '国際': '🌍 国際',
                    'テクノロジー': '💻 テクノロジー',
                    '国内': '🇯🇵 国内'
                };

                async function fetchWithProxy(url) {
                    // Strategy 1: allorigins JSON endpoint (best for encoding)
                    try {
                        var resp = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent(url), { signal: AbortSignal.timeout(12000) });
                        if (resp.ok) {
                            var json = await resp.json();
                            if (json.contents) return json.contents;
                        }
                    } catch (e) { /* try next */ }

                    // Strategy 2: raw proxies
                    for (var i = 0; i < CORS_PROXIES.length; i++) {
                        try {
                            var resp2 = await fetch(CORS_PROXIES[i] + encodeURIComponent(url), { signal: AbortSignal.timeout(12000) });
                            if (resp2.ok) return await resp2.text();
                        } catch (e) { /* try next proxy */ }
                    }
                    throw new Error('All proxies failed');
                }

                // -- JSON-based RSS fetch (for Japanese feeds — avoids XML encoding issues) --
                async function fetchFeedViaJson(source) {
                    var RSS2JSON = 'https://api.rss2json.com/v1/api.json?rss_url=';
                    try {
                        var resp = await fetch(RSS2JSON + encodeURIComponent(source.url), { signal: AbortSignal.timeout(15000) });
                        if (!resp.ok) throw new Error('rss2json error ' + resp.status);
                        var data = await resp.json();
                        if (data.status !== 'ok' || !data.items) throw new Error('rss2json bad response');

                        return data.items.slice(0, 8).map(function (item) {
                            var rawTitle = (item.title || '').trim() || 'No Title';
                            var rawDesc = (item.description || item.content || '').replace(/<[^>]+>/g, '').trim();
                            return {
                                title: rawTitle,
                                link: item.link || '#',
                                description: rawDesc || rawTitle,
                                imageUrl: item.enclosure && item.enclosure.link ? item.enclosure.link : (item.thumbnail || ''),
                                pubDate: item.pubDate ? new Date(item.pubDate).toISOString() : new Date().toISOString(),
                                source: source.name, sourceIcon: source.icon,
                                category: source.category, lang: source.lang,
                                summary: '', translated: false
                            };
                        });
                    } catch (e) {
                        console.warn('[RSS-JSON] ' + source.name + ':', e.message);
                        return [];
                    }
                }

                // -- XML-based RSS fetch via CORS proxy --
                async function fetchFeedViaXml(source) {
                    try {
                        var text = await fetchWithProxy(source.url);

                        // Try text/xml first, then text/html as fallback
                        var xml = new DOMParser().parseFromString(text, 'text/xml');
                        if (xml.querySelector('parsererror')) {
                            xml = new DOMParser().parseFromString(text, 'text/html');
                        }

                        var items = xml.querySelectorAll('item');
                        var entries = items.length > 0 ? items : xml.querySelectorAll('entry');
                        var articles = [];

                        entries.forEach(function (item, idx) {
                            if (idx >= 8) return;
                            var title = (item.querySelector('title') ? item.querySelector('title').textContent : '').trim() || 'No Title';
                            var linkEl = item.querySelector('link');
                            var link = (linkEl ? (linkEl.textContent.trim() || linkEl.getAttribute('href')) : '') || '#';
                            var descEl = item.querySelector('description') || item.querySelector('summary');
                            var desc = descEl ? descEl.textContent.trim() : '';
                            var pubDateEl = item.querySelector('pubDate') || item.querySelector('published') || item.querySelector('updated');
                            var pubDate = pubDateEl ? pubDateEl.textContent : '';

                            var imageUrl = '';
                            var mc = item.querySelector('content[url]') || item.querySelector('thumbnail');
                            if (mc) imageUrl = mc.getAttribute('url') || '';
                            var enc = item.querySelector('enclosure[type^="image"]');
                            if (!imageUrl && enc) imageUrl = enc.getAttribute('url') || '';
                            if (!imageUrl) { var m = desc.match(/<img[^>]+src=["']([^"']+)["']/); if (m) imageUrl = m[1]; }

                            articles.push({
                                title: title, link: link,
                                description: desc.replace(/<[^>]+>/g, '').trim() || title,
                                imageUrl: imageUrl,
                                pubDate: pubDate ? new Date(pubDate).toISOString() : new Date().toISOString(),
                                source: source.name, sourceIcon: source.icon,
                                category: source.category, lang: source.lang,
                                summary: '', translated: false
                            });
                        });
                        return articles;
                    } catch (e) {
                        console.warn('[RSS-XML] ' + source.name + ':', e.message);
                        return [];
                    }
                }

                // -- Combined fetch: try JSON first for JP feeds, XML first for EN feeds --
                async function fetchFeed(source) {
                    var articles;
                    if (source.lang === 'ja') {
                        // Japanese feeds: JSON first (avoids encoding issues), XML fallback
                        articles = await fetchFeedViaJson(source);
                        if (articles.length === 0) articles = await fetchFeedViaXml(source);
                    } else {
                        // English feeds: XML first (faster), JSON fallback
                        articles = await fetchFeedViaXml(source);
                        if (articles.length === 0) articles = await fetchFeedViaJson(source);
                    }
                    return articles;
                }

                        { title: 'ヨーロッパ市場で電気自動車の販売台数が従来車を上回る', link: 'https://bbc.com/news/business', description: '歴史上初めて、ヨーロッパ市場全体で電気自動車の販売台数が従来の内燃エンジン車を上回りました。このマイルストーンは消費者の採用が加速していることと充電インフラの拡大を反映しています。アナリストはこのトレンドが今後2年以内に他の主要市場にも広がると予測しています。', imageUrl: '', pubDate: new Date(now - 21600000).toISOString(), source: 'BBC News', sourceIcon: '🌍', category: '国際', lang: 'ja', summary: '', translated: true },

                async function fetchAllFeeds(onProgress) {
                    var total = NEWS_SOURCES.length;
                    var completed = 0;
                    var promises = NEWS_SOURCES.map(async function (src) {
                        var res = await fetchFeed(src);
                        completed++;
                        if (onProgress) onProgress(completed, total, 'フィード取得中');
                        return res;
                    });
                    var results = await Promise.allSettled(promises);
                    var all = results.filter(function (r) { return r.status === 'fulfilled'; }).flatMap(function (r) { return r.value; });

                    if (all.length === 0) {
                        console.info('[RSS] 全フィード取得失敗。デモデータを使用します。');
                        if (onProgress) onProgress(total, total, '完了');
                        return getDemoArticles();
                    }
                    all.sort(function (a, b) { return new Date(b.pubDate) - new Date(a.pubDate); });
                    return all;
                }

                // ============================================================
                // TRANSLATION + SUMMARIZATION PIPELINE
                // ============================================================
                async function processArticles(articles, onProgress) {
                    var processed = [];
                    var total = articles.length;

                    // Process in batches to avoid rate limiting
                    for (var i = 0; i < articles.length; i++) {
                        var article = articles[i];

                        if (article.lang === 'en' && !article.translated) {
                            // Translate English articles to Japanese
                            if (onProgress) onProgress(i + 1, total, '翻訳中 (' + (i + 1) + '/' + total + ')');
                            article = await translateArticle(article);
                            // Small delay between API calls
                            if (i < articles.length - 1) {
                                await new Promise(function (resolve) { setTimeout(resolve, 300); });
                            }
                        }

                        // Summarize (now in Japanese)
                        article.summary = article.summary || summarize(article.description);
                        processed.push(article);
                    }

                    return processed;
                }

                // ============================================================
                // APP LOGIC
                // ============================================================
                var allArticles = [];
                var currentFilter = 'All';
                var isLoading = false;

                var $ = function (id) { return document.getElementById(id); };
                var newsGrid = $('news-grid');
                var refreshBtn = $('refresh-btn');
                var refreshIcon = $('refresh-icon');
                var refreshText = $('refresh-text');
                var progressBar = $('progress-bar');
                var filterContainer = $('filter-tabs');
                var statTotal = $('stat-total');
                var statSources = $('stat-sources');
                var statUpdated = $('stat-updated');

                function escapeHtml(str) {
                    if (!str) return '';
                    var d = document.createElement('div');
                    d.textContent = str;
                    return d.innerHTML;
                }

                function getTimeAgo(dateStr) {
                    if (!dateStr) return '';
                    var diff = Date.now() - new Date(dateStr).getTime();
                    var mins = Math.floor(diff / 60000);
                    if (mins < 1) return 'たった今';
                    if (mins < 60) return mins + '分前';
                    var hrs = Math.floor(mins / 60);
                    if (hrs < 24) return hrs + '時間前';
                    return Math.floor(hrs / 24) + '日前';
                }

                function renderSkeletons(count) {
                    count = count || 6;
                    newsGrid.innerHTML = Array.from({ length: count }, function () {
                        return '<div class="glass-card">' +
                            '<div class="skeleton" style="height:180px;border-radius:16px 16px 0 0"></div>' +
                            '<div style="padding:20px">' +
                            '<div class="skeleton" style="height:16px;width:60%;margin-bottom:12px"></div>' +
                            '<div class="skeleton" style="height:14px;width:100%;margin-bottom:8px"></div>' +
                            '<div class="skeleton" style="height:14px;width:90%;margin-bottom:8px"></div>' +
                            '<div class="skeleton" style="height:14px;width:70%"></div>' +
                            '</div></div>';
                    }).join('');
                }

                function renderArticles(articles) {
                    if (articles.length === 0) {
                        newsGrid.innerHTML = '<div class="empty-state" style="grid-column:1/-1">' +
                            '<div class="icon">📡</div>' +
                            '<p style="font-size:1.1rem;margin-bottom:8px">ニュースが見つかりません</p>' +
                            '<p style="font-size:0.85rem">「更新」ボタンを押して最新ニュースを取得してください。</p></div>';
                        return;
                    }

                    newsGrid.innerHTML = articles.map(function (article, index) {
                        var catClass = article.category === '国際' ? 'world' : article.category === 'テクノロジー' ? 'tech' : 'japan';
                        var timeAgo = getTimeAgo(article.pubDate);
                        var imgHtml = article.imageUrl
                            ? '<img src="' + escapeHtml(article.imageUrl) + '" alt="' + escapeHtml(article.title) + '" loading="lazy" onerror="this.parentElement.innerHTML=\'<div class=placeholder>' + article.sourceIcon + '</div>\'">'
                            : '<div class="placeholder">' + article.sourceIcon + '</div>';

                        var translatedBadge = article.translated ? '<span style="font-size:0.6rem;background:rgba(99,102,241,0.3);color:#a5b4fc;padding:2px 6px;border-radius:4px;margin-left:6px">🌐 翻訳済</span>' : '';

                        return '<article class="glass-card fade-in" style="animation-delay:' + (index * 0.05) + 's;display:flex;flex-direction:column">' +
                            '<div class="news-card-image">' + imgHtml +
                            '<span class="category-badge ' + catClass + '">' + escapeHtml(article.category) + '</span></div>' +
                            '<div style="padding:20px;display:flex;flex-direction:column;gap:12px;flex:1">' +
                            '<div style="display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:4px">' +
                            '<span class="source-badge">' + article.sourceIcon + ' ' + escapeHtml(article.source) + translatedBadge + '</span>' +
                            '<span style="font-size:0.7rem;color:var(--text-secondary)">' + timeAgo + '</span></div>' +
                            '<h3 style="font-size:0.95rem;font-weight:600;line-height:1.4;color:var(--text-primary)">' + escapeHtml(article.title) + '</h3>' +
                            '<p class="summary-text">' + (article.summary ? '🤖 ' + escapeHtml(article.summary) : escapeHtml(article.description.substring(0, 150))) + '</p>' +
                            '<div style="margin-top:auto;padding-top:12px;border-top:1px solid var(--border-color)">' +
                            '<a href="' + escapeHtml(article.link) + '" target="_blank" rel="noopener noreferrer" class="read-more">記事を読む <span>→</span></a>' +
                            '</div></div></article>';
                    }).join('');
                }

                function renderStats(articles) {
                    var sources = new Set(articles.map(function (a) { return a.source; }));
                    statTotal.textContent = articles.length;
                    statSources.textContent = sources.size;
                    statUpdated.textContent = new Date().toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' });
                }

                function renderFilters() {
                    var cats = ['All'];
                    NEWS_SOURCES.forEach(function (s) { if (cats.indexOf(s.category) === -1) cats.push(s.category); });
                    filterContainer.innerHTML = cats.map(function (cat) {
                        var label = CATEGORY_LABELS[cat] || cat;
                        return '<button class="filter-tab ' + (cat === currentFilter ? 'active' : '') + '" data-category="' + cat + '">' +
                            label + '</button>';
                    }).join('');

                    filterContainer.querySelectorAll('.filter-tab').forEach(function (btn) {
                        btn.addEventListener('click', function () {
                            currentFilter = btn.dataset.category;
                            renderFilters();
                            applyFilter();
                        });
                    });
                }

                function applyFilter() {
                    var filtered = currentFilter === 'All' ? allArticles : allArticles.filter(function (a) { return a.category === currentFilter; });
                    renderArticles(filtered);
                }

                function setLoading(loading) {
                    isLoading = loading;
                    refreshBtn.disabled = loading;
                    progressBar.style.opacity = loading ? '1' : '0';
                    if (loading) {
                        refreshIcon.innerHTML = '<svg class="spinner" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>';
                        refreshText.textContent = '取得中...';
                    } else {
                        refreshIcon.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>';
                        refreshText.textContent = '更新';
                    }
                }

                async function refreshNews() {
                    if (isLoading) return;
                    setLoading(true);
                    renderSkeletons();
                    try {
                        // Phase 1: Fetch RSS feeds
                        var raw = await fetchAllFeeds(function (done, total, phase) {
                            refreshText.textContent = phase + ' (' + done + '/' + total + ')';
                        });

                        // Phase 2: Translate EN articles + Summarize all
                        refreshText.textContent = '翻訳・要約処理中...';
                        var processed = await processArticles(raw, function (done, total, phase) {
                            refreshText.textContent = phase;
                        });

                        allArticles = mergeArticles(processed);
                        renderArticles(allArticles);
                        renderStats(allArticles);
                        renderFilters();
                    } catch (error) {
                        console.error('[App]', error);
                        newsGrid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="icon">⚠️</div>' +
                            '<p style="font-size:1.1rem;margin-bottom:8px">データ取得に失敗しました</p>' +
                            '<p style="font-size:0.85rem">ネットワーク接続を確認して、もう一度お試しください。</p></div>';
                    } finally {
                        setLoading(false);
                    }
                }

                // ===== INIT =====
                document.addEventListener('DOMContentLoaded', function () {
                    allArticles = getStoredArticles();
                    if (allArticles.length > 0) {
                        renderArticles(allArticles);
                        renderStats(allArticles);
                    } else {
                        renderSkeletons();
                    }
                    renderFilters();
                    refreshBtn.addEventListener('click', refreshNews);
                    if (allArticles.length === 0) refreshNews();
                });

            })();
    </script>
</body>

</html>
