<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ワールドニュース ダッシュボード — AI翻訳・要約付き</title>
    <meta name="description"
        content="世界の最新ニュースをAIが翻訳・要約して一覧表示するダッシュボード。BBC, Reuters, TechCrunch, NHK, Yahoo!ニュースから自動収集。">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['"Noto Sans JP"', 'Inter', 'ui-sans-serif', 'system-ui'] },
                    colors: {
                        dark: { 900: '#0b1120', 800: '#111827', 700: '#1e293b' },
                        cyan: { 400: '#22d3ee', 500: '#06b6d4' }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="style.css">
</head>

<body class="antialiased">

    <!-- Progress Bar -->
    <div id="progress-bar" class="progress-bar fixed top-0 left-0 w-full z-50" style="opacity: 0;"></div>

    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">

        <!-- Header -->
        <header class="flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 mb-8">
            <div>
                <h1 class="text-2xl sm:text-3xl font-bold tracking-tight">
                    <span class="bg-gradient-to-r from-cyan-400 to-indigo-400 bg-clip-text text-transparent">
                        ワールドニュース ダッシュボード
                    </span>
                </h1>
                <p class="text-sm text-slate-400 mt-1">AI翻訳・要約エンジン搭載 — 世界と日本の最新ニュースをひと目で</p>
            </div>
            <button id="refresh-btn" class="refresh-btn">
                <span id="refresh-icon">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <polyline points="23 4 23 10 17 10" />
                        <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10" />
                    </svg>
                </span>
                <span id="refresh-text">更新</span>
            </button>
        </header>

        <!-- Stats Bar -->
        <div class="grid grid-cols-3 gap-4 mb-6">
            <div class="stat-card">
                <p class="text-xs text-slate-400 mb-1">総記事数</p>
                <p id="stat-total" class="text-xl font-bold text-cyan-400">0</p>
            </div>
            <div class="stat-card">
                <p class="text-xs text-slate-400 mb-1">ソース数</p>
                <p id="stat-sources" class="text-xl font-bold text-indigo-400">0</p>
            </div>
            <div class="stat-card">
                <p class="text-xs text-slate-400 mb-1">最終更新</p>
                <p id="stat-updated" class="text-xl font-bold text-emerald-400">--:--</p>
            </div>
        </div>

        <!-- Category Filters -->
        <div id="filter-tabs" class="flex flex-wrap gap-2 mb-6"></div>

        <!-- News Grid -->
        <div id="news-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>

        <!-- Footer -->
        <footer class="mt-16 text-center text-xs text-slate-500 pb-8">
            <p>ワールドニュース ダッシュボード &mdash; RSS &amp; AI翻訳・要約エンジン搭載</p>
            <p class="mt-1">BBC, Reuters, TechCrunch, NHKニュース, Yahoo!ニュース から自動収集</p>
            <button id="reset-btn"
                style="margin-top: 12px; color: var(--text-secondary); text-decoration: underline; background: none; border: none; cursor: pointer;">
                キャッシュとデータをリセット
            </button>
        </footer>
    </div>

    <script type="module" src="app.js"></script>
</body>

</html>
